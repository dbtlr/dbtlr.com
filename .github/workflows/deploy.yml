name: Deploy

# v2 (staging): every push deploys to the dbtlr-com-v2 Worker on workers.dev.
# Production (main -> dbtlr.com) is added at cutover — see Mimir DBTL-8.
on:
  push:
    branches: [v2]
  workflow_dispatch:

concurrency:
  group: deploy-v2
  cancel-in-progress: true

jobs:
  staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name dbtlr-com-v2
